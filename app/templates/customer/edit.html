{% extends 'base.html' %}
{% block title %}Sửa khách hàng{% endblock %}
{% block content %}
<h4 class="mb-4">✏️ Sửa khách hàng</h4>
<form method="POST" class="col-md-6">
    <div class="mb-3">
        <label>Tên khách hàng</label>
        <input type="text" name="name" class="form-control" value="{{ customer.name }}" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" value="{{ customer.email if customer.email else '' }}">
    </div>
    <div class="mb-3">
        <label>Điện thoại</label>
        <input type="tel" name="phone" class="form-control" value="{{ customer.phone if customer.phone else '' }}">
    </div>
    <div class="mb-3">
        <label>Địa chỉ</label>
        <textarea name="address" class="form-control" rows="3">{{ customer.address if customer.address else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Cập nhật</button>
    <a href="{{ url_for('customers.index') }}" class="btn btn-secondary">Hủy</a>
</form>
{% endblock %}
